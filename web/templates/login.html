{% extends "base.html" %}
{% block title %}Sign In — Posit+EV{% endblock %}

{% block head %}
<style>
main { max-width: 460px; padding-top: var(--space-7); }

.auth-header { text-align: center; margin-bottom: var(--space-5); }
.auth-header h1 { font-size: 1.6rem; margin-bottom: var(--space-1); }
.auth-header p  { font-size: 0.9rem; color: var(--text-muted); margin: 0; }

.auth-card {
  background: #fff;
  border: 1px solid var(--brand-border);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  box-shadow: var(--shadow-md);
}

.auth-footer {
  text-align: center;
  font-size: 0.875rem;
  margin-top: var(--space-4);
  color: var(--text-muted);
}
.auth-footer a { font-weight: 600; }
</style>
{% endblock %}

{% block content %}

<div class="auth-header">
  <h1>Welcome back</h1>
  <p>Sign in to view today&rsquo;s +EV picks</p>
</div>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<div class="auth-card">
  <form method="post" action="/login">
    <label>
      Email address
      <input type="email" name="email" placeholder="you@example.com" required />
    </label>
    <label>
      Password
      <input type="password" name="password" placeholder="Your password" required />
    </label>
    <button type="submit">Sign In &rarr;</button>
  </form>
</div>

<p class="auth-footer">
  Don&rsquo;t have an account? <a href="/register">Create one free</a>
</p>

{% endblock %}
