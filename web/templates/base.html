<!DOCTYPE html>

  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />

  {% block head %}{% endblock %}
</head>
<body>

    <a href="/" class="nav-logo" aria-label="Posit+EV home">

  <main>{% block content %}{% endblock %}</main>

</html>
