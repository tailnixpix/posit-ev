<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Posit+EV{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/styles.css" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-logo" aria-label="Posit+EV home">
      <img src="/static/logo.svg" height="32" alt="Posit+EV" />
    </a>
    {% if user is defined and user %}
      <a href="/dashboard" style="font-weight:600;">My Dashboard</a>
      <form action="/logout" method="post" style="margin:0;">
        <button type="submit" style="background:none;border:none;cursor:pointer;font-size:inherit;color:inherit;padding:0;font-family:inherit;font-weight:500;">Sign Out</button>
      </form>
    {% else %}
      <a href="/pricing">Pricing</a>
      <a href="/login">Sign In</a>
    {% endif %}
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
