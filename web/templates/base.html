<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Posit+EV{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/styles.css" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-logo" aria-label="Posit+EV home">
      <img src="/static/logo.svg" height="32" alt="Posit+EV" />
    </a>
    <div class="nav-right">
      <div class="tz-picker" aria-label="Time zone">
        <button class="tz-btn" data-tz="America/New_York"  title="Eastern Time">ET</button>
        <button class="tz-btn" data-tz="America/Chicago"   title="Central Time">CT</button>
        <button class="tz-btn" data-tz="America/Denver"    title="Mountain Time">MT</button>
        <button class="tz-btn" data-tz="America/Los_Angeles" title="Pacific Time">PT</button>
      </div>

      {% if user is defined and user %}
        <div class="nav-auth">
          <a href="/dashboard" class="nav-btn nav-btn-primary">Dashboard</a>
          <form action="/logout" method="post" style="margin:0;">
            <button type="submit" class="nav-btn nav-btn-ghost">Sign Out</button>
          </form>
        </div>
      {% else %}
        <div class="nav-auth">
          <a href="/pricing" class="nav-link">Pricing</a>
          <a href="/login" class="nav-link">Sign In</a>
        </div>
      {% endif %}
    </div>
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
