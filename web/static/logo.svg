<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 295 80" width="295" height="80" role="img" aria-label="Posit+EV logo">
  <title>Posit+EV</title>

  <!-- Card background -->
  <rect x="1" y="1" width="293" height="78" rx="12" ry="12"
        fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1.5"/>

  <!-- Probability arc icon -->
  <g transform="translate(14, 3)">

    <!-- +EV zone: shaded fill under right half of arc (8% opacity) -->
    <path d="M 40.75,19.75 C 54.5,19.75 69,31.5 78,55 L 40.75,55 Z"
          fill="#534AB7" fill-opacity="0.08"/>

    <!-- Full probability arc -->
    <path d="M 8,55 C 20,8 60,8 78,55"
          fill="none"
          stroke="#534AB7"
          stroke-width="3.5"
          stroke-linecap="round"/>

    <!-- Dot at arc peak -->
    <circle cx="40.75" cy="19.75" r="4.5" fill="#534AB7"/>

  </g>

  <!-- Wordmark: Posit+EV -->
  <text x="104" y="49"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="36"
        font-weight="500"
        letter-spacing="-0.5"><tspan fill="#26215C">Posit</tspan><tspan fill="#534AB7">+</tspan><tspan fill="#26215C">EV</tspan></text>

</svg>
