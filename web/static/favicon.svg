<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Posit+EV icon">
  <title>Posit+EV</title>
  <!-- Card background — matches brand card style at icon scale -->
  <rect width="32" height="32" rx="6" ry="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <!-- +EV zone fill: right half of arc at 8% opacity -->
  <!-- Arc: M 4,26 C 10,6 22,6 28,26  — De Casteljau peak at (16,11), right half control pts (20.5,11) (25,16) -->
  <path d="M 16,11 C 20.5,11 25,16 28,26 L 16,26 Z"
        fill="#534AB7" fill-opacity="0.08"/>
  <!-- Probability arc -->
  <path d="M 4,26 C 10,6 22,6 28,26"
        fill="none"
        stroke="#534AB7"
        stroke-width="2.5"
        stroke-linecap="round"/>
  <!-- Peak dot -->
  <circle cx="16" cy="11" r="2.5" fill="#534AB7"/>
</svg>
